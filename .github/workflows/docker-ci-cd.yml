name: CI/CD - Build & Push Docker Images

on:
  push:
    branches:
      - main

env:
  DOCKER_USERNAME: dipronil1998
  IMAGE_NAME: ai-rag-app

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 3. Set up Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 4. Build & Push Backend Image
      - name: Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./server
          push: true
          tags: |
            ${{ env.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:backend-latest
            ${{ env.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:backend-${{ github.sha }}

      # 5. Build & Push Frontend Image
      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./client
          push: true
          tags: |
            ${{ env.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:frontend-latest
            ${{ env.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:frontend-${{ github.sha }}