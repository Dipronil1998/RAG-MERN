version: "3.9"

services:
  redis:
    image: redis:7-alpine
    container_name: ai_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - ai_network

  backend:
    build:
      context: ./server
    container_name: ai_backend
    restart: always
    ports:
      - "9000:9000"
    depends_on:
      - redis
    env_file:
      - ./server/.env
    volumes:
      - ./server:/app
      - /app/node_modules
    networks:
      - ai_network

  frontend:
    build:
      context: ./client
    container_name: ai_frontend
    restart: always
    ports:
      - "5173:5173"
    depends_on:
      - backend
    environment:
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./client:/app
      - /app/node_modules
    networks:
      - ai_network

  qdrant:
    image: qdrant/qdrant:latest
    container_name: ai_qdrant
    restart: always

    ports:
      - "6333:6333"
      - "6334:6334"

    volumes:
      - qdrant_data:/qdrant/storage

    networks:
      - ai_network

volumes:
  redis_data:
  qdrant_data:

networks:
  ai_network:
    driver: bridge